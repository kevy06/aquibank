name: aquibank
description: AquiBank - Seu controle financeiro digital
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # External backend (Supabase Auth + sync)
  supabase_flutter: ^2.5.4

  # Local persistence (SQLite)
  sqflite: ^2.4.1
  path: ^1.9.0

  # Session Persistence (theme + profile photo only)
  shared_preferences: ^2.2.3

  # Local biometric authentication
  local_auth: ^2.3.0

  # Unique IDs
  uuid: ^4.4.0

  # Typography
  google_fonts: ^6.2.1

  # Charts
  fl_chart: ^0.69.0

  # Loading Effects
  shimmer: ^3.0.0

  # Networking (NewsAPI)
  http: ^1.2.1

  # Utilities
  intl: ^0.20.2

  # Image picker (profile photo)
  image_picker: ^1.1.2

  # App launcher icon
  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
